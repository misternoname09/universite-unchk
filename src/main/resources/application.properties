# Configuration de la base PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/universite_unchk_db
spring.datasource.username=postgres
spring.datasource.password=Admin123admin312
spring.datasource.driver-class-name=org.postgresql.Driver
#psql -U postgres -d universite_unchk_db
# JPA / Hibernate
##spring.jpa.hibernate.ddl-auto=update
#spring.jpa.hibernate.ddl-auto=create
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

#file.upload-dir=uploads
file.upload-dir=./uploads



spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=email@gmail.com
spring.mail.password=app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Actuator
management.endpoints.web.exposure.include=health,info,metrics

# JWT secret
app.jwtSecret=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
app.jwtExpirationMs=86400000

# CORS allowed origin (Angular)
cors.allowed.origin=http://localhost:4201

